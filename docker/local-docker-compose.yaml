version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: notif_mongo_local
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_local_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: notifications

  redis:
    image: redis:7-alpine
    container_name: notif_redis_local
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_local_data:/data

volumes:
  mongo_local_data:
  redis_local_data: