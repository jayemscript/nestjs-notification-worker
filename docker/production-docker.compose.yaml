version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: notif_mongo_prod
    restart: always
    ports:
      - '127.0.0.1:27017:27017'
    volumes:
      - mongo_prod_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: notifications
    command: ['--auth', '--bind_ip_all']
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: notif_redis_prod
    restart: always
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_prod_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  mongo_prod_data:
  redis_prod_data: