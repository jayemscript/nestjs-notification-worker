services:
  redis:
    image: redis:7-alpine
    container_name: notif_redis_local
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_local_data:/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: notif_redis_ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis

volumes:
  redis_local_data: